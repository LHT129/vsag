version: 2.1

executors:
  vsag_compile_executor:
    docker:
      - image: vsaglib/vsag:ubuntu
    working_directory: /root/project/

workflows:
  pull-request-workflow:
    jobs:
      - pull-request-build:
          filters:
            branches:
              ignore:
                - main
      - pull-request-unittest:
          filters:
            branches:
              ignore:
                - main
          requires:
            - pull-request-build
      - pull-request-functest:
          filters:
            branches:
              ignore:
                - main
          requires:
            - pull-request-build

  main-branch-workflow:
    jobs:
      - main-branch-check:
          filters:
            branches:
              only:
                - main

jobs:
  pull-request-build:
    executor: vsag_compile_executor
    resource_class: medium+
    steps:
      - checkout
      - run: git fetch
      - run: ./scripts/check_format.sh
      - restore_cache:
          keys:
            - fork-cache-{{ checksum "CMakeLists.txt" }}-{{ checksum ".circleci/fresh_ci_cache.commit" }}
      - run: make asan
      - save_cache:
          key: fork-cache-{{ checksum "CMakeLists.txt" }}-{{ checksum ".circleci/fresh_ci_cache.commit" }}
          paths:
            - ./build
      - persist_to_workspace:
          root: /root/project/
          paths:
            - build

  pull-request-unittest:
    executor: vsag_compile_executor
    resource_class: medium
    steps:
      - attach_workspace:
          at: /root/project/
      - run: /root/project/build/tests/unittests -d yes --allow-running-no-tests [hnsw]
      - run: /root/project/build/tests/unittests -d yes --allow-running-no-tests [diskann]
      - run: /root/project/build/tests/unittests -d yes --allow-running-no-tests ~[diskann]~[hnsw]
      - run: /root/project/build/mockimpl/tests_mockimpl -d yes --allow-running-no-tests

  pull-request-functest:
    executor: vsag_compile_executor
    resource_class: small
    steps:
      - attach_workspace:
          at: /root/project/
      - run: /root/project/build/tests/functests -d yes --allow-running-no-tests [hnsw]
      - run: /root/project/build/tests/functests -d yes --allow-running-no-tests [diskann]
      - run: /root/project/build/tests/functests -d yes --allow-running-no-tests ~[diskann]~[hnsw]

  main-branch-check:
    docker:
      - image: vsaglib/vsag:ubuntu
    resource_class: medium+
    steps:
      - checkout
      - run: ./scripts/check_format.sh
      - restore_cache:
          keys:
            - main-ccache-{{ checksum "CMakeLists.txt" }}-{{ checksum ".circleci/fresh_ci_cache.commit" }}
      - run: make asan
      - save_cache:
          key: main-ccache-{{ checksum "CMakeLists.txt" }}-{{ checksum ".circleci/fresh_ci_cache.commit" }}
          paths:
            - ./build
      - run: make test_asan_parallel
